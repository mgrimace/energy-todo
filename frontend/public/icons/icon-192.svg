<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 1024 1024" role="img" aria-label="Energy spiral icon">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a242b"/>
      <stop offset="100%" stop-color="#0f1315"/>
    </radialGradient>
    <linearGradient id="spiralGrad" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#d9f2ff" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#9fbfd8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#4c5b68" stop-opacity="0.25"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <ellipse cx="512" cy="480" rx="460" ry="420" fill="rgba(79,97,112,0.03)"/>
  <g transform="translate(512,512)" filter="url(#glow)">
    <circle r="220" fill="none" stroke="url(#spiralGrad)" stroke-width="34" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
    <circle r="140" fill="none" stroke="#cfe9ff" stroke-width="18" stroke-linecap="round" opacity="0.9"/>
    <circle r="72" fill="none" stroke="#bfe8ff" stroke-width="12" stroke-linecap="round" opacity="0.95"/>
    <circle cx="0" cy="0" r="40" fill="#e6f7ff" opacity="0.95"/>
    <circle cx="0" cy="0" r="120" fill="rgba(173,217,255,0.06)"/>
  </g>
  <g fill="#d7f0ff" opacity="0.06">
    <circle cx="740" cy="220" r="3"/>
    <circle cx="860" cy="600" r="2"/>
    <circle cx="180" cy="340" r="2.5"/>
    <circle cx="420" cy="820" r="1.8"/>
    <circle cx="600" cy="140" r="1.5"/>
  </g>
</svg>
